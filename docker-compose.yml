version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: autonomie
      POSTGRES_USER: autonomie
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://autonomie:${POSTGRES_PASSWORD:-dev_password}@db:5432/autonomie
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  postgres_data: