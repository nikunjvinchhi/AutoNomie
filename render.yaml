databases:
  - name: autonomie-db
    databaseName: autonomie
    user: autonomie

services:
  - type: web
    name: autonomie-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn src.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: autonomie-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
    healthCheckPath: /health

  - type: web
    name: autonomie-client
    env: node
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: ./frontend/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://autonomie-api.onrender.com